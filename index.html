async function apiPost(data) {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(data), redirect: "follow" });
    return await res.json();
  } catch (err) { console.error("API fout:", err); return null; }
}
async function apiGet(params) {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const url = new URL(APPS_SCRIPT_URL);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString(), { redirect: "follow" });
    return await res.json();
  } catch (err) { console.error("API fout:", err); return null; }
}

function notesReducer(state, action) {
  switch (action.type) {
    case "SET_NOTES": return { ...state, ...action.notes };
    case "ADD_NOTE": return { ...state, [action.jobId]: [...(state[action.jobId] || []), { text: action.text, door: action.door || "", tijd: action.tijd || new Date().toLocaleString("nl-NL", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }), saving: action.saving || false }] };
    case "NOTE_SAVED": return { ...state, [action.jobId]: (state[action.jobId] || []).map((n, i) => i === action.index ? { ...n, saving: false } : n) };
    case "DELETE_NOTE": return { ...state, [action.jobId]: (state[action.jobId] || []).filter((_, i) => i !== action.index) };
    default: return state;
  }
}

function PriorityBadge({ priority }) {
  const c = priorityConfig[priority] || priorityConfig.P2;
  return h("span", { style: { fontSize: "11px", fontWeight: 700, color: c.color, backgroundColor: c.bg, border: "1px solid " + c.border, borderRadius: "6px", padding: "2px 8px" } }, c.label);
}
function ConditieBadge({ conditie }) {
  const c = conditieConfig[conditie] || { color: "#6b7280", bg: "#f3f4f6" };
  return h("span", { style: { fontSize: "11px", fontWeight: 600, color: c.color, backgroundColor: c.bg, borderRadius: "6px", padding: "2px 8px" } }, conditie);
}
function ReadyBadge({ ready }) {
  const c = readyConfig[ready] || readyConfig["In wachtrij"];
  return h("span", { style: { fontSize: "11px", fontWeight: 600, color: c.color, backgroundColor: c.bg, borderRadius: "6px", padding: "2px 8px" } }, c.icon + " " + ready);
}
function SyncBadge({ connected }) {

    h("span", { style: { width: "6px", height: "6px", borderRadius: "50%", backgroundColor: connected ? "#10b981" : "#94a3b8", display: "inline-block" } }),
    connected ? "Sync actief" : "Offline modus"

}

function NoteInput({ onSubmit, saving, userName }) {
  const [text, setText] = useState("");
  const handleSubmit = (e) => { e.preventDefault(); e.stopPropagation(); if (text.trim() && !saving && userName) { onSubmit(text.trim(), userName); setText(""); } };
  return h("form", { onSubmit: handleSubmit, onClick: (e) => e.stopPropagation(), style: { display: "flex", gap: "8px", marginTop: "10px" } },
    h("input", { type: "text", value: text, onChange: (e) => setText(e.target.value), placeholder: "Opmerking toevoegen...", disabled: saving, style: { flex: 1, padding: "8px 12px", borderRadius: "8px", border: "1.5px solid #e2e8f0", fontSize: "13px", outline: "none", fontFamily: "inherit", backgroundColor: saving ? "#f1f5f9" : "#f8fafc", opacity: saving ? 0.6 : 1 } }),
    h("button", { type: "submit", disabled: saving, style: { padding: "8px 14px", borderRadius: "8px", border: "none", backgroundColor: text.trim() && !saving ? "#0f172a" : "#e2e8f0", color: text.trim() && !saving ? "#fff" : "#94a3b8", fontSize: "13px", fontWeight: 600, cursor: text.trim() && !saving ? "pointer" : "default", fontFamily: "inherit" } }, saving ? "..." : "+")

}

function JobCard({ job, expanded, onToggle, notes, onAddNote, onDeleteNote, userName }) {

    // Top row
    h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "8px" } },
      h("div", { style: { flex: 1 } },

        h("div", { style: { fontSize: "13px", color: "#64748b" } }, job.kleur + (job.kenteken ? " \u2022 " + job.kenteken : ""))

        h(ReadyBadge, { ready: job.ready })

    // Info row
    h("div", { style: { display: "flex", gap: "10px", alignItems: "center", flexWrap: "wrap" } },

      job.klant ? h("span", { style: { fontSize: "12px", color: "#1e293b", fontWeight: 600 } }, "\uD83C\uDFF7\uFE0F " + job.klant) : null,
      hasNotes && !expanded ? h("span", { style: { fontSize: "11px", color: "#f59e0b" } }, "\uD83D\uDCAC " + (allNotes.length + (job.opmerking ? 1 : 0))) : null

    expanded ? h("div", { onClick: (e) => e.stopPropagation(), style: { marginTop: "12px", paddingTop: "12px", borderTop: "1px solid #e2e8f0", fontSize: "13px", color: "#475569" } },
      h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "10px" } },
        h("div", null, h("span", { style: { color: "#94a3b8" } }, "Taak: "), job.taak),
        job.chassisnummer ? h("div", null, h("span", { style: { color: "#94a3b8" } }, "Chassis: "), job.chassisnummer) : null,
        job.kenteken ? h("div", null, h("span", { style: { color: "#94a3b8" } }, "Kenteken: "), job.kenteken) : null
      ),
      job.opmerking ? h("div", { style: { padding: "10px 12px", backgroundColor: "#fefce8", borderRadius: "8px", fontSize: "12px", color: "#854d0e", lineHeight: 1.5, marginBottom: "8px" } },
        "\uD83D\uDCAC " + job.opmerking,
        h("div", { style: { fontSize: "10px", color: "#a3882b", marginTop: "4px" } }, "Uit spreadsheet")
      ) : null,
      allNotes.map((note, i) =>
        h("div", { key: i, style: { padding: "10px 12px", backgroundColor: note.saving ? "#f0f4ff" : "#eff6ff", borderRadius: "8px", fontSize: "12px", color: "#1e40af", lineHeight: 1.5, marginBottom: "6px", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px", opacity: note.saving ? 0.7 : 1 } },
          h("div", { style: { flex: 1 } },

              note.door ? " \u2022 " : null,
              note.tijd,
              note.saving ? " \u2022 Opslaan..." : null

          !note.saving ? h("button", { onClick: (e) => { e.stopPropagation(); onDeleteNote(i); }, style: { background: "none", border: "none", color: "#93c5fd", cursor: "pointer", fontSize: "14px", padding: "0 4px", lineHeight: 1, flexShrink: 0 } }, "\u2715") : null
        )

      h(NoteInput, { onSubmit: onAddNote, saving: isSaving, userName: userName })

    h("div", { style: { textAlign: "center", marginTop: "6px" } },

  );
}

function DaySection({ dag, datum, jobs, notes, onAddNote, onDeleteNote, userName }) {
  const [expandedId, setExpandedId] = useState(null);
  const totalUren = jobs.reduce((sum, j) => { const m = j.uren.match(/(\d+)/); return sum + (m ? parseInt(m[1]) : 0); }, 0);
  const dateObj = new Date(datum);
  const dateStr = dateObj.toLocaleDateString("nl-NL", { day: "numeric", month: "short" });

  return h("div", { style: { marginBottom: "24px" } },
    h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px", paddingBottom: "8px", borderBottom: "2px solid #e2e8f0" } },
      h("div", null,
        h("span", { style: { fontSize: "17px", fontWeight: 800, color: "#0f172a" } }, dag),
        h("span", { style: { fontSize: "13px", color: "#94a3b8", marginLeft: "8px" } }, dateStr)
      ),
      h("div", { style: { display: "flex", gap: "10px", alignItems: "center" } },
        h("span", { style: { fontSize: "12px", color: "#64748b", backgroundColor: "#f1f5f9", padding: "4px 10px", borderRadius: "20px", fontWeight: 600 } }, jobs.length + " auto" + (jobs.length !== 1 ? "'s" : "")),
        totalUren > 0 ? h("span", { style: { fontSize: "12px", color: "#0369a1", backgroundColor: "#e0f2fe", padding: "4px 10px", borderRadius: "20px", fontWeight: 600 } }, "~" + totalUren + " uur") : null
      )
    ),
    jobs.sort((a, b) => { const p = { P1: 0, P2: 1, P3: 2 }; return (p[a.prioriteit] || 9) - (p[b.prioriteit] || 9); }).map((job) =>
      h(JobCard, { key: job.id, job: job, expanded: expandedId === job.id, onToggle: () => setExpandedId(expandedId === job.id ? null : job.id), notes: notes[job.id], onAddNote: (text, door) => onAddNote(job.id, text, door), onDeleteNote: (index) => onDeleteNote(job.id, index), userName: userName })
    )
  );
}

function App() {
  const [selectedWeek, setSelectedWeek] = useState("Week 12");
  const [notes, dispatchNotes] = useReducer(notesReducer, {});
  const [isConnected, setIsConnected] = useState(false);
  const userName = "Serfaas";
  const [lastRefresh, setLastRefresh] = useState(null);

  const loadNotes = useCallback(async (week) => {
    if (!APPS_SCRIPT_URL) return;
    const result = await apiGet({ action: "getNotes", week });
    if (result && result.success && result.notes) { dispatchNotes({ type: "SET_NOTES", notes: result.notes }); setIsConnected(true); }
  }, []);

  useEffect(() => {
    if (!APPS_SCRIPT_URL) return;
    setIsConnected(true);
    loadNotes(selectedWeek);
    setLastRefresh(new Date());
    const interval = setInterval(() => { loadNotes(selectedWeek); setLastRefresh(new Date()); }, 30000);
    return () => clearInterval(interval);
  }, [selectedWeek, loadNotes]);

  const weekData = useMemo(() => INITIAL_DATA.filter((d) => d.week === selectedWeek), [selectedWeek]);
  const filtered = weekData;

  const groupedByDay = useMemo(() => {
    const map = new Map();
    const dayOrder = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag", "Zaterdag", "Zondag"];
    filtered.forEach((job) => { if (!map.has(job.dag)) map.set(job.dag, { datum: job.datum, jobs: [] }); map.get(job.dag).jobs.push(job); });
    return Array.from(map.entries()).sort((a, b) => dayOrder.indexOf(a[0]) - dayOrder.indexOf(b[0]));
  }, [filtered]);

  const totalAutos = filtered.length;
  const totalUren = filtered.reduce((sum, j) => { const m = j.uren.match(/(\d+)/); return sum + (m ? parseInt(m[1]) : 0); }, 0);

  const handleWeekChange = (weekKey) => { setSelectedWeek(weekKey); };

  const handleAddNote = async (jobId, text, door) => {
    const tijd = new Date().toLocaleString("nl-NL", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
    dispatchNotes({ type: "ADD_NOTE", jobId, text, door, tijd, saving: !!APPS_SCRIPT_URL });
    if (APPS_SCRIPT_URL) {
      const job = INITIAL_DATA.find((d) => d.id === jobId);
      const result = await apiPost({ action: "addNote", jobId, week: job ? job.week : selectedWeek, text: text });
      const currentNotes = notes[jobId] || [];
      dispatchNotes({ type: "NOTE_SAVED", jobId, index: currentNotes.length });
    }
  };

  const handleDeleteNote = async (jobId, index) => {
    dispatchNotes({ type: "DELETE_NOTE", jobId, index });
    if (APPS_SCRIPT_URL) {
      const job = INITIAL_DATA.find((d) => d.id === jobId);
      await apiPost({ action: "deleteNote", jobId, week: job ? job.week : selectedWeek, noteIndex: index });
    }
  };

  return h("div", { style: { maxWidth: "480px", margin: "0 auto", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif", backgroundColor: "#f8fafc", minHeight: "100vh", paddingBottom: "40px" } },
    // Header
    h("div", { style: { background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", padding: "20px 20px 16px", color: "white", position: "sticky", top: 0, zIndex: 10 } },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" } },
        h("div", { style: { fontSize: "11px", fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.1em" } }, "\uD83D\uDE97 Detailing Planner"),
        h("div", { style: { display: "flex", flexDirection: "column", alignItems: "flex-end", gap: "2px" } },
          h(SyncBadge, { connected: isConnected }),
          lastRefresh ? h("span", { style: { fontSize: "9px", color: "#64748b" } }, "Ververst om " + lastRefresh.toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit", second: "2-digit" })) : null
        )
      ),
      // Week switcher
      h("div", { style: { display: "flex", gap: "6px", marginBottom: "14px" } },
        WEEKS.map((w) => h("button", { key: w.key, onClick: () => handleWeekChange(w.key), style: { flex: 1, padding: "10px 8px", borderRadius: "10px", border: selectedWeek === w.key ? "2px solid #60a5fa" : "2px solid transparent", backgroundColor: selectedWeek === w.key ? "rgba(96,165,250,0.15)" : "rgba(255,255,255,0.06)", color: selectedWeek === w.key ? "#ffffff" : "#94a3b8", cursor: "pointer", transition: "all 0.2s ease", textAlign: "center" } },
          h("div", { style: { fontSize: "14px", fontWeight: 700 } }, w.label),
          h("div", { style: { fontSize: "10px", marginTop: "2px", opacity: 0.8 } }, w.dateRange)
        ))
      ),
      // Stats
      h("div", { style: { display: "flex", gap: "10px" } },
        h("div", { style: { flex: 1, backgroundColor: "rgba(255,255,255,0.08)", borderRadius: "10px", padding: "10px 8px", textAlign: "center" } }, h("div", { style: { fontSize: "20px", fontWeight: 800 } }, totalAutos), h("div", { style: { fontSize: "10px", color: "#94a3b8" } }, "Auto's")),
        h("div", { style: { flex: 1, backgroundColor: "rgba(255,255,255,0.08)", borderRadius: "10px", padding: "10px 8px", textAlign: "center" } }, h("div", { style: { fontSize: "20px", fontWeight: 800 } }, totalUren > 0 ? "~" + totalUren : "-"), h("div", { style: { fontSize: "10px", color: "#94a3b8" } }, "Uren")),
        h("div", { style: { flex: 1, backgroundColor: "rgba(255,255,255,0.08)", borderRadius: "10px", padding: "10px 8px", textAlign: "center" } }, h("div", { style: { fontSize: "20px", fontWeight: 800 } }, groupedByDay.length), h("div", { style: { fontSize: "10px", color: "#94a3b8" } }, "Dagen")),
        h("div", { style: { flex: 1, backgroundColor: "rgba(255,255,255,0.08)", borderRadius: "10px", padding: "10px 8px", textAlign: "center" } }, h("div", { style: { fontSize: "20px", fontWeight: 800 } }, filtered.filter((j) => j.ready === "Ja").length), h("div", { style: { fontSize: "10px", color: "#94a3b8" } }, "Klaar"))
      )
    ),
    // Day sections
    h("div", { style: { padding: "16px 16px 0" } },
      groupedByDay.length === 0
        ? h("div", { style: { textAlign: "center", padding: "40px 20px", color: "#94a3b8" } }, h("div", { style: { fontSize: "40px", marginBottom: "12px" } }, "\uD83D\uDCCB"), h("div", { style: { fontSize: "15px", fontWeight: 600 } }, "Geen opdrachten deze week"))
        : groupedByDay.map(([dag, { datum, jobs }]) => h(DaySection, { key: dag, dag, datum, jobs, notes, onAddNote: handleAddNote, onDeleteNote: handleDeleteNote, userName }))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
