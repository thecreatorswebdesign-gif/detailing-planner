// Bereken dynamische weken: vorige week, deze week, volgende week
function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function getWeekDates(date) {
  const d = new Date(date);
  const day = d.getDay() || 7;
  const monday = new Date(d);
  monday.setDate(d.getDate() - day + 1);
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  const months = ["jan", "feb", "mrt", "apr", "mei", "jun", "jul", "aug", "sep", "okt", "nov", "dec"];
  const mStart = months[monday.getMonth()];
  const mEnd = months[friday.getMonth()];
  if (mStart === mEnd) {
    return monday.getDate() + " \u2013 " + friday.getDate() + " " + mEnd;
  }
  return monday.getDate() + " " + mStart + " \u2013 " + friday.getDate() + " " + mEnd;
}

function buildDynamicWeeks() {
  const now = new Date();
  const weeks = [];
  for (let offset = -1; offset <= 1; offset++) {
    const d = new Date(now);
    d.setDate(d.getDate() + offset * 7);
    const wn = getWeekNumber(d);
    const key = "Week " + wn;
    const label = "W" + wn;
    const dateRange = getWeekDates(d);
    weeks.push({ key, label, dateRange, isCurrent: offset === 0 });
  }
  return weeks;
}

const DYNAMIC_WEEKS = buildDynamicWeeks();

async function apiPost(data) {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(data), redirect: "follow" });
    return await res.json();
  } catch (err) { console.error("API fout:", err); return null; }
}
async function apiGet(params) {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const url = new URL(APPS_SCRIPT_URL);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString(), { redirect: "follow" });
    return await res.json();
  } catch (err) { console.error("API fout:", err); return null; }
}

function notesReducer(state, action) {
  switch (action.type) {
    case "SET_NOTES": return { ...state, ...action.notes };
    case "CLEAR_NOTES": return {};
    case "ADD_NOTE": return { ...state, [action.jobId]: [...(state[action.jobId] || []), { text: action.text, door: action.door || "", tijd: action.tijd || new Date().toLocaleString("nl-NL", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }), saving: action.saving || false }] };
    case "NOTE_SAVED": return { ...state, [action.jobId]: (state[action.jobId] || []).map((n, i) => i === action.index ? { ...n, saving: false } : n) };
    case "DELETE_NOTE": return { ...state, [action.jobId]: (state[action.jobId] || []).filter((_, i) => i !== action.index) };
    default: return state;
  }
}

function checklistReducer(state, action) {
  switch (action.type) {
    case "SET_CHECKLIST": return { ...state, [action.jobId]: action.checks };
    case "SET_ALL": return { ...state, ...action.data };
    case "TOGGLE_CHECK": {
      const current = state[action.jobId] || [];
      const has = current.includes(action.key);
      return { ...state, [action.jobId]: has ? current.filter(k => k !== action.key) : [...current, action.key] };
    }
    case "CLEAR": return {};
    default: return state;
  }
}

function ChecklistItem({ checked, label, onToggle }) {
  const [popping, setPopping] = useState(false);
  const handleClick = (e) => {
    e.stopPropagation();
    if (!checked) setPopping(true);
    onToggle();
  };
  useEffect(() => {
    if (popping) { const t = setTimeout(() => setPopping(false), 300); return () => clearTimeout(t); }
  }, [popping]);

  return h("div", {
    onClick: handleClick,
    style: { display: "flex", alignItems: "center", gap: "10px", padding: "8px 0", cursor: "pointer", transition: "opacity 0.2s" }
  },
    h("div", {
      style: {
        width: "22px", height: "22px", borderRadius: "6px", flexShrink: 0,
        border: checked ? "none" : "2px solid #D5D5D5",
        backgroundColor: checked ? "#000" : "#fff",
        display: "flex", alignItems: "center", justifyContent: "center",
        transition: "all 0.2s ease",
        animation: popping ? "checkPop 0.3s ease" : "none"
      }
    },
      checked ? h("svg", { width: 12, height: 12, viewBox: "0 0 12 12", fill: "none" },
        h("path", { d: "M2 6l3 3 5-5", stroke: "#fff", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" })
      ) : null
    ),
    h("span", {
      style: {
        fontSize: "13px", fontWeight: 500,
        color: checked ? "#AAA" : "#000",
        textDecoration: checked ? "line-through" : "none",
        transition: "all 0.2s ease"
      }
    }, label)
  );
}

      )
    ),
    h("div", { style: { display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" } },
      h(ReadyDropdown, { ready: job.ready || "In wachtrij", onChange: (val) => onStatusChange(job.id, val) }),
      h(UrenDropdown, { uren: job.uren, onChange: (val) => onUrenChange(job.id, val) }),
      job.conditie ? h("span", { style: { fontSize: "11px", fontWeight: 500, color: "#888", borderRadius: "999px", padding: "3px 10px", border: "1px solid #E5E5E5" } }, job.conditie) : null,
      job.aangemeld ? h("span", { style: { fontSize: "11px", fontWeight: 500, color: "#888" } }, job.aangemeld) : null,
      job.klant ? h("span", { style: { fontSize: "11px", fontWeight: 700, color: "#000" } }, job.klant) : null,
      hasNotes && !expanded ? h("span", { style: { fontSize: "10px", fontWeight: 700, color: "#D4A843" } }, (allNotes.length + (job.opmerking ? 1 : 0)) + " notitie" + ((allNotes.length + (job.opmerking ? 1 : 0)) !== 1 ? "s" : "")) : null
    ),
    expanded ? h("div", { onClick: (e) => e.stopPropagation(), style: { marginTop: "16px", paddingTop: "16px", borderTop: "1px solid #E5E5E5" } },
      h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "14px" } },
        job.taak ? h("div", null,
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Taak"),
          h("div", { style: { fontSize: "13px", fontWeight: 600, color: "#000" } }, job.taak)
        ) : null,
        job.chassisnummer ? h("div", null,
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Chassis"),
          h("div", { style: { fontSize: "13px", fontWeight: 600, color: "#000" } }, job.chassisnummer)
        ) : null,
        job.kenteken ? h("div", null,
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Kenteken"),
          h("div", { style: { fontSize: "13px", fontWeight: 600, color: "#000" } }, job.kenteken)
        ) : null
      ),
      // Detailing Checklist
      h(ChecklistSection, { jobId: job.id, checks: checkedKeys, onToggle: onCheckToggle, autoType: currentType, onTypeChange: onTypeChange }),
      // Opmerkingen
      job.opmerking ? h("div", { style: { padding: "12px 14px", backgroundColor: "#F5F5F3", borderRadius: "12px", fontSize: "13px", fontWeight: 500, color: "#000", lineHeight: 1.5, marginBottom: "8px", marginTop: "16px" } },
        job.opmerking,
        h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", marginTop: "6px", textTransform: "uppercase", letterSpacing: "0.06em" } }, "Spreadsheet")
      ) : null,
      allNotes.map((note, i) =>
        h("div", { key: i, style: { padding: "12px 14px", backgroundColor: "#F5F5F3", borderRadius: "12px", fontSize: "13px", fontWeight: 500, color: "#000", lineHeight: 1.5, marginBottom: "6px", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px", opacity: note.saving ? 0.5 : 1 } },
          h("div", { style: { flex: 1 } },
            note.text,
            h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", marginTop: "6px" } },
              note.door ? h("span", { style: { fontWeight: 700, color: "#000" } }, note.door) : null,
              note.door ? " \u00B7 " : null,
              note.tijd,
              note.saving ? " \u00B7 Opslaan\u2026" : null
            )
          ),
          !note.saving ? h("button", { onClick: (e) => { e.stopPropagation(); onDeleteNote(i); }, style: { background: "none", border: "none", color: "#CCC", cursor: "pointer", fontSize: "14px", fontWeight: 700, padding: "0 4px", lineHeight: 1, flexShrink: 0, transition: "color 0.2s" } }, "\u00D7") : null
        )
      ),
      h(NoteInput, { onSubmit: onAddNote, saving: isSaving, userName: userName })
    ) : null
  );
}

function DaySection({ dag, datum, jobs, notes, onAddNote, onDeleteNote, userName, onStatusChange, onUrenChange, checklists, onCheckToggle, autoTypes, onTypeChange }) {
  const [expandedId, setExpandedId] = useState(null);
  const totalUren = jobs.reduce((sum, j) => { const u = j.uren || ""; const m = u.match(/(\d+)/); return sum + (m ? parseInt(m[1]) : 0); }, 0);
  const dateObj = datum ? new Date(datum) : null;
  const dateStr = dateObj && !isNaN(dateObj) ? dateObj.toLocaleDateString("nl-NL", { day: "numeric", month: "short" }) : "";

  return h("div", { style: { marginBottom: "32px" } },
    h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "14px" } },
      h("div", { style: { display: "flex", alignItems: "baseline", gap: "10px" } },
        h("span", { style: { fontSize: "22px", fontWeight: 900, color: "#000000", letterSpacing: "-0.03em" } }, dag || "Onbekend"),
        dateStr ? h("span", { style: { fontSize: "12px", fontWeight: 500, color: "#888888" } }, dateStr) : null
      ),
      h("div", { style: { display: "flex", gap: "12px", alignItems: "baseline" } },
        h("span", { style: { fontSize: "12px", fontWeight: 600, color: "#888" } }, jobs.length + " auto" + (jobs.length !== 1 ? "\u2019s" : "")),
        totalUren > 0 ? h("span", { style: { fontSize: "12px", fontWeight: 700, color: "#000" } }, totalUren + "u") : null
      )
    ),
    jobs.sort((a, b) => { const p = { P1: 0, P2: 1, P3: 2 }; return (p[a.prioriteit] || 9) - (p[b.prioriteit] || 9); }).map((job) =>
      h(JobCard, { key: job.id, job: job, expanded: expandedId === job.id, onToggle: () => setExpandedId(expandedId === job.id ? null : job.id), notes: notes[job.id], onAddNote: (text, door) => onAddNote(job.id, text, door), onDeleteNote: (index) => onDeleteNote(job.id, index), userName: userName, onStatusChange: onStatusChange, onUrenChange: onUrenChange, checks: checklists[job.id], onCheckToggle: onCheckToggle, autoType: (autoTypes || {})[job.id], onTypeChange: onTypeChange })
    )
  );
}

function App() {
  const [selectedWeek, setSelectedWeek] = useState(CURRENT_WEEK);
  const [jobs, setJobs] = useState([]);
  const [notes, dispatchNotes] = useReducer(notesReducer, {});
  const [checklists, dispatchChecklist] = useReducer(checklistReducer, {});
  const [autoTypes, setAutoTypes] = useState({});
  const [isConnected, setIsConnected] = useState(false);
  const [isLoading, setIsLoading] = useState(true);
  const userName = "Serfaas";
  const [lastRefresh, setLastRefresh] = useState(null);
  const jobsRef = useRef([]);

  const loadWeekData = useCallback(async (week) => {
    if (!APPS_SCRIPT_URL) return;
    setIsLoading(true);
    try {
      const [weekResult, notesResult, checkResult, typeResult] = await Promise.all([
        apiGet({ action: "getWeekData", week }),
        apiGet({ action: "getNotes", week }),
        apiGet({ action: "getChecklist", week }),
        apiGet({ action: "getAutoTypes", week })
      ]);
      if (weekResult && weekResult.success && weekResult.jobs) {
        setJobs(weekResult.jobs);
        jobsRef.current = weekResult.jobs;
        setIsConnected(true);
      }
      if (notesResult && notesResult.success && notesResult.notes) {
        dispatchNotes({ type: "CLEAR_NOTES" });
        dispatchNotes({ type: "SET_NOTES", notes: notesResult.notes });
      }
      if (checkResult && checkResult.success && checkResult.checklists) {
        dispatchChecklist({ type: "CLEAR" });
        dispatchChecklist({ type: "SET_ALL", data: checkResult.checklists });
      }
      if (typeResult && typeResult.success && typeResult.types) {
        setAutoTypes(typeResult.types);
      }
      setLastRefresh(new Date());
    } catch (err) {
      console.error("Laden mislukt:", err);
    }
    setIsLoading(false);
  }, []);

  useEffect(() => {
    if (!APPS_SCRIPT_URL) return;
    loadWeekData(selectedWeek);
    const interval = setInterval(() => { loadWeekData(selectedWeek); }, 30000);
    return () => clearInterval(interval);
  }, [selectedWeek, loadWeekData]);

  const filtered = jobs;

  const groupedByDay = useMemo(() => {
    const map = new Map();
    const dayOrder = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag", "Zaterdag", "Zondag"];
    filtered.forEach((job) => { const dag = job.dag || "Onbekend"; if (!map.has(dag)) map.set(dag, { datum: job.datum, jobs: [] }); map.get(dag).jobs.push(job); });
    return Array.from(map.entries()).sort((a, b) => { const ia = dayOrder.indexOf(a[0]); const ib = dayOrder.indexOf(b[0]); return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib); });
  }, [filtered]);

  const totalAutos = filtered.length;
  const totalUren = filtered.reduce((sum, j) => { const u = j.uren || ""; const m = u.match(/(\d+)/); return sum + (m ? parseInt(m[1]) : 0); }, 0);

  const handleWeekChange = (weekKey) => { setSelectedWeek(weekKey); setJobs([]); dispatchNotes({ type: "CLEAR_NOTES" }); dispatchChecklist({ type: "CLEAR" }); setAutoTypes({}); };

  const handleStatusChange = async (jobId, newStatus) => {
    setJobs((prev) => prev.map((j) => j.id.toString() === jobId.toString() ? { ...j, ready: newStatus } : j));
    if (APPS_SCRIPT_URL) {
      await apiPost({ action: "updateReady", jobId, week: selectedWeek, ready: newStatus });
    }
  };

  const handleUrenChange = async (jobId, newUren) => {
    setJobs((prev) => prev.map((j) => j.id.toString() === jobId.toString() ? { ...j, uren: newUren } : j));
    if (APPS_SCRIPT_URL) {
      await apiPost({ action: "updateUren", jobId, week: selectedWeek, uren: newUren });
    }
  };

  const handleCheckToggle = async (jobId, key) => {
    dispatchChecklist({ type: "TOGGLE_CHECK", jobId, key });
    // Bepaal nieuwe staat na toggle
    const current = checklists[jobId] || [];
    const has = current.includes(key);
    const newChecks = has ? current.filter(k => k !== key) : [...current, key];
    if (APPS_SCRIPT_URL) {
      await apiPost({ action: "updateChecklist", jobId, week: selectedWeek, checks: newChecks });
    }
  };

  const handleTypeChange = async (jobId, type) => {
    setAutoTypes(prev => ({ ...prev, [jobId]: type }));
    // Clear checks als type verandert
    dispatchChecklist({ type: "SET_CHECKLIST", jobId, checks: [] });
    if (APPS_SCRIPT_URL) {
      await apiPost({ action: "updateAutoType", jobId, week: selectedWeek, autoType: type });
      await apiPost({ action: "updateChecklist", jobId, week: selectedWeek, checks: [] });
    }
  };

  const handleAddNote = async (jobId, text, door) => {
    const tijd = new Date().toLocaleString("nl-NL", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
    dispatchNotes({ type: "ADD_NOTE", jobId, text, door, tijd, saving: !!APPS_SCRIPT_URL });
    if (APPS_SCRIPT_URL) {
      const result = await apiPost({ action: "addNote", jobId, week: selectedWeek, text: text });
      const currentNotes = notes[jobId] || [];
      dispatchNotes({ type: "NOTE_SAVED", jobId, index: currentNotes.length });
    }
  };

  const handleDeleteNote = async (jobId, index) => {
    dispatchNotes({ type: "DELETE_NOTE", jobId, index });
    if (APPS_SCRIPT_URL) {
      await apiPost({ action: "deleteNote", jobId, week: selectedWeek, noteIndex: index });
    }
  };

  return h("div", { style: { maxWidth: "430px", margin: "0 auto", backgroundColor: "#F5F5F3", minHeight: "100vh", paddingBottom: "40px" } },
    // Header
    h("div", { style: { backgroundColor: "#FFFFFF", padding: "16px 20px", position: "sticky", top: 0, zIndex: 10, borderBottom: "1px solid #E5E5E5" } },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px", paddingTop: "4px" } },
        h("div", { style: { fontSize: "11px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em" } }, "Detailing Planner"),
        h("div", { style: { display: "flex", alignItems: "center", gap: "12px" } },
          h(SyncBadge, { connected: isConnected, loading: isLoading }),
          lastRefresh ? h("span", { style: { fontSize: "10px", color: "#CCC" } }, lastRefresh.toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" })) : null
        )
      ),
      // Week switcher
      h("div", { style: { display: "flex", gap: "6px", marginBottom: "20px" } },
        DYNAMIC_WEEKS.map((w) => h("button", { key: w.key, onClick: () => handleWeekChange(w.key), style: { flex: 1, padding: "12px 8px", borderRadius: "12px", border: "none", backgroundColor: selectedWeek === w.key ? "#000000" : "transparent", color: selectedWeek === w.key ? "#FFFFFF" : "#888888", cursor: "pointer", transition: "all 0.2s ease", textAlign: "center" } },
          h("div", { style: { fontSize: "16px", fontWeight: 800, letterSpacing: "-0.02em" } }, w.label),
          h("div", { style: { fontSize: "10px", fontWeight: 500, marginTop: "2px", opacity: 0.7 } }, w.dateRange)
        ))
      ),
      // Stats
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-end", paddingBottom: "4px" } },
        h("div", null,
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Auto\u2019s"),
          h("div", { style: { fontSize: "48px", fontWeight: 900, color: "#000000", letterSpacing: "-0.04em", lineHeight: 0.95 } }, totalAutos)
        ),
        h("div", { style: { textAlign: "center" } },
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Uren"),
          h("div", { style: { fontSize: "48px", fontWeight: 900, color: "#000000", letterSpacing: "-0.04em", lineHeight: 0.95 } }, totalUren > 0 ? totalUren : "\u2014")
        ),
        h("div", { style: { textAlign: "center" } },
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Dagen"),
          h("div", { style: { fontSize: "48px", fontWeight: 900, color: "#000000", letterSpacing: "-0.04em", lineHeight: 0.95 } }, groupedByDay.length)
        ),
        h("div", { style: { textAlign: "right" } },
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Klaar"),
          h("div", { style: { fontSize: "48px", fontWeight: 900, color: "#000000", letterSpacing: "-0.04em", lineHeight: 0.95 } }, filtered.filter((j) => j.ready === "Ja").length)
        )
      )
    ),
    // Day sections
    h("div", { style: { padding: "24px 20px 0" } },
      isLoading && jobs.length === 0
        ? h("div", { style: { textAlign: "center", padding: "60px 20px", color: "#888" } },
            h("div", { style: { width: "24px", height: "24px", border: "2px solid #E5E5E5", borderTopColor: "#000", borderRadius: "50%", animation: "spin 0.6s linear infinite", margin: "0 auto 16px" } }),
            h("div", { style: { fontSize: "14px", fontWeight: 600 } }, "Data laden\u2026")
          )
        : groupedByDay.length === 0
          ? h("div", { style: { textAlign: "center", padding: "60px 20px", color: "#888" } },
              h("div", { style: { fontSize: "48px", fontWeight: 900, color: "#CCC", letterSpacing: "-0.04em", marginBottom: "8px" } }, "\u2014"),
              h("div", { style: { fontSize: "14px", fontWeight: 600 } }, "Geen opdrachten deze week")
            )
          : groupedByDay.map(([dag, { datum, jobs: dayJobs }]) => h(DaySection, { key: dag, dag, datum, jobs: dayJobs, notes, onAddNote: handleAddNote, onDeleteNote: handleDeleteNote, userName, onStatusChange: handleStatusChange, onUrenChange: handleUrenChange, checklists, onCheckToggle: handleCheckToggle, autoTypes, onTypeChange: handleTypeChange }))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
