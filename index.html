async function apiPost(data) {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(data), redirect: "follow" });
    return await res.json();
  } catch (err) { console.error("API fout:", err); return null; }
}
async function apiGet(params) {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const url = new URL(APPS_SCRIPT_URL);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString(), { redirect: "follow" });
    return await res.json();
  } catch (err) { console.error("API fout:", err); return null; }
}

function notesReducer(state, action) {
  switch (action.type) {
    case "SET_NOTES": return { ...state, ...action.notes };
    case "ADD_NOTE": return { ...state, [action.jobId]: [...(state[action.jobId] || []), { text: action.text, door: action.door || "", tijd: action.tijd || new Date().toLocaleString("nl-NL", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }), saving: action.saving || false }] };
    case "NOTE_SAVED": return { ...state, [action.jobId]: (state[action.jobId] || []).map((n, i) => i === action.index ? { ...n, saving: false } : n) };
    case "DELETE_NOTE": return { ...state, [action.jobId]: (state[action.jobId] || []).filter((_, i) => i !== action.index) };
    default: return state;
  }
}

  );
}

function NoteInput({ onSubmit, saving, userName }) {
  const [text, setText] = useState("");
  const handleSubmit = (e) => { e.preventDefault(); e.stopPropagation(); if (text.trim() && !saving && userName) { onSubmit(text.trim(), userName); setText(""); } };
  return h("form", { onSubmit: handleSubmit, onClick: (e) => e.stopPropagation(), style: { display: "flex", gap: "8px", marginTop: "12px" } },
    h("input", { type: "text", value: text, onChange: (e) => setText(e.target.value), placeholder: "Opmerking toevoegen\u2026", disabled: saving, style: { flex: 1, padding: "10px 14px", borderRadius: "12px", border: "1px solid #E5E5E5", fontSize: "13px", fontWeight: 500, outline: "none", backgroundColor: "#FFFFFF", opacity: saving ? 0.5 : 1 } }),
    h("button", { type: "submit", disabled: saving, style: { width: "40px", height: "40px", borderRadius: "12px", border: "none", backgroundColor: text.trim() && !saving ? "#000000" : "#E5E5E5", color: text.trim() && !saving ? "#FFFFFF" : "#888888", fontSize: "18px", fontWeight: 700, cursor: text.trim() && !saving ? "pointer" : "default", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s ease" } }, "+")

function JobCard({ job, expanded, onToggle, notes, onAddNote, onDeleteNote, userName, onStatusChange, onUrenChange }) {
  const autoNaam = [job.merk, job.model].filter(Boolean).join(" ");

        h("div", { style: { fontSize: "12px", fontWeight: 500, color: "#888888", marginTop: "4px" } }, job.kleur + (job.kenteken ? " \u00B7 " + job.kenteken : ""))

      )
    ),
    // Meta row
    h("div", { style: { display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" } },
      h(ReadyDropdown, { ready: job.ready, onChange: (val) => onStatusChange(job.id, val) }),
      h(UrenDropdown, { uren: job.uren, onChange: (val) => onUrenChange(job.id, val) }),
      h("span", { style: { fontSize: "11px", fontWeight: 500, color: "#888", borderRadius: "999px", padding: "3px 10px", border: "1px solid #E5E5E5" } }, job.conditie),
      h("span", { style: { fontSize: "11px", fontWeight: 500, color: "#888" } }, job.aangemeld),
      job.klant ? h("span", { style: { fontSize: "11px", fontWeight: 700, color: "#000" } }, job.klant) : null,
      hasNotes && !expanded ? h("span", { style: { fontSize: "10px", fontWeight: 700, color: "#D4A843" } }, (allNotes.length + (job.opmerking ? 1 : 0)) + " notitie" + ((allNotes.length + (job.opmerking ? 1 : 0)) !== 1 ? "s" : "")) : null
    ),
    // Expanded
    expanded ? h("div", { onClick: (e) => e.stopPropagation(), style: { marginTop: "16px", paddingTop: "16px", borderTop: "1px solid #E5E5E5" } },
      h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "14px" } },
        h("div", null,
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Taak"),
          h("div", { style: { fontSize: "13px", fontWeight: 600, color: "#000" } }, job.taak)
        ),
        job.chassisnummer ? h("div", null,
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Chassis"),
          h("div", { style: { fontSize: "13px", fontWeight: 600, color: "#000" } }, job.chassisnummer)
        ) : null,
        job.kenteken ? h("div", null,
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Kenteken"),
          h("div", { style: { fontSize: "13px", fontWeight: 600, color: "#000" } }, job.kenteken)
        ) : null
      ),
      job.opmerking ? h("div", { style: { padding: "12px 14px", backgroundColor: "#F5F5F3", borderRadius: "12px", fontSize: "13px", fontWeight: 500, color: "#000", lineHeight: 1.5, marginBottom: "8px" } },
        job.opmerking,
        h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", marginTop: "6px", textTransform: "uppercase", letterSpacing: "0.06em" } }, "Spreadsheet")
      ) : null,
      allNotes.map((note, i) =>
        h("div", { key: i, style: { padding: "12px 14px", backgroundColor: "#F5F5F3", borderRadius: "12px", fontSize: "13px", fontWeight: 500, color: "#000", lineHeight: 1.5, marginBottom: "6px", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px", opacity: note.saving ? 0.5 : 1 } },
          h("div", { style: { flex: 1 } },
            note.text,
            h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", marginTop: "6px" } },

function DaySection({ dag, datum, jobs, notes, onAddNote, onDeleteNote, userName, onStatusChange, onUrenChange }) {
  const [expandedId, setExpandedId] = useState(null);
  const totalUren = jobs.reduce((sum, j) => { const m = j.uren.match(/(\d+)/); return sum + (m ? parseInt(m[1]) : 0); }, 0);
  const dateObj = new Date(datum);
  const dateStr = dateObj.toLocaleDateString("nl-NL", { day: "numeric", month: "short" });

  return h("div", { style: { marginBottom: "32px" } },
    h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "14px" } },
      h("div", { style: { display: "flex", alignItems: "baseline", gap: "10px" } },
        h("span", { style: { fontSize: "22px", fontWeight: 900, color: "#000000", letterSpacing: "-0.03em" } }, dag),
        h("span", { style: { fontSize: "12px", fontWeight: 500, color: "#888888" } }, dateStr)
      ),
      h("div", { style: { display: "flex", gap: "12px", alignItems: "baseline" } },
        h("span", { style: { fontSize: "12px", fontWeight: 600, color: "#888" } }, jobs.length + " auto" + (jobs.length !== 1 ? "\u2019s" : "")),
        totalUren > 0 ? h("span", { style: { fontSize: "12px", fontWeight: 700, color: "#000" } }, totalUren + "u") : null
      )
    ),
    jobs.sort((a, b) => { const p = { P1: 0, P2: 1, P3: 2 }; return (p[a.prioriteit] || 9) - (p[b.prioriteit] || 9); }).map((job) =>
      h(JobCard, { key: job.id, job: job, expanded: expandedId === job.id, onToggle: () => setExpandedId(expandedId === job.id ? null : job.id), notes: notes[job.id], onAddNote: (text, door) => onAddNote(job.id, text, door), onDeleteNote: (index) => onDeleteNote(job.id, index), userName: userName, onStatusChange: onStatusChange, onUrenChange: onUrenChange })
    )
  );
}

function App() {
  const [selectedWeek, setSelectedWeek] = useState("Week 12");
  const [notes, dispatchNotes] = useReducer(notesReducer, {});
  const [isConnected, setIsConnected] = useState(false);
  const userName = "Serfaas";
  const [lastRefresh, setLastRefresh] = useState(null);
  const [statusOverrides, setStatusOverrides] = useState({});
  const [urenOverrides, setUrenOverrides] = useState({});

  const loadNotes = useCallback(async (week) => {
    if (!APPS_SCRIPT_URL) return;
    const result = await apiGet({ action: "getNotes", week });
    if (result && result.success && result.notes) { dispatchNotes({ type: "SET_NOTES", notes: result.notes }); setIsConnected(true); }
  }, []);

  useEffect(() => {
    if (!APPS_SCRIPT_URL) return;
    setIsConnected(true);
    loadNotes(selectedWeek);
    setLastRefresh(new Date());
    const interval = setInterval(() => { loadNotes(selectedWeek); setLastRefresh(new Date()); }, 30000);
    return () => clearInterval(interval);
  }, [selectedWeek, loadNotes]);

  const weekData = useMemo(() => INITIAL_DATA.filter((d) => d.week === selectedWeek).map((d) => {
    let job = d;
    if (statusOverrides[d.id]) job = { ...job, ready: statusOverrides[d.id] };
    if (urenOverrides[d.id]) job = { ...job, uren: urenOverrides[d.id] };
    return job;
  }), [selectedWeek, statusOverrides, urenOverrides]);
  const filtered = weekData;

  const groupedByDay = useMemo(() => {
    const map = new Map();
    const dayOrder = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag", "Zaterdag", "Zondag"];
    filtered.forEach((job) => { if (!map.has(job.dag)) map.set(job.dag, { datum: job.datum, jobs: [] }); map.get(job.dag).jobs.push(job); });
    return Array.from(map.entries()).sort((a, b) => dayOrder.indexOf(a[0]) - dayOrder.indexOf(b[0]));
  }, [filtered]);

  const totalAutos = filtered.length;
  const totalUren = filtered.reduce((sum, j) => { const m = j.uren.match(/(\d+)/); return sum + (m ? parseInt(m[1]) : 0); }, 0);

  const handleWeekChange = (weekKey) => { setSelectedWeek(weekKey); };

  const handleStatusChange = async (jobId, newStatus) => {
    setStatusOverrides((prev) => ({ ...prev, [jobId]: newStatus }));
    if (APPS_SCRIPT_URL) {
      const job = INITIAL_DATA.find((d) => d.id === jobId);
      await apiPost({ action: "updateReady", jobId, week: job ? job.week : selectedWeek, ready: newStatus });
    }
  };

  const handleUrenChange = async (jobId, newUren) => {
    setUrenOverrides((prev) => ({ ...prev, [jobId]: newUren }));
    if (APPS_SCRIPT_URL) {
      const job = INITIAL_DATA.find((d) => d.id === jobId);
      await apiPost({ action: "updateUren", jobId, week: job ? job.week : selectedWeek, uren: newUren });
    }
  };

  const handleAddNote = async (jobId, text, door) => {
    const tijd = new Date().toLocaleString("nl-NL", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
    dispatchNotes({ type: "ADD_NOTE", jobId, text, door, tijd, saving: !!APPS_SCRIPT_URL });
    if (APPS_SCRIPT_URL) {
      const job = INITIAL_DATA.find((d) => d.id === jobId);
      const result = await apiPost({ action: "addNote", jobId, week: job ? job.week : selectedWeek, text: text });
      const currentNotes = notes[jobId] || [];
      dispatchNotes({ type: "NOTE_SAVED", jobId, index: currentNotes.length });
    }
  };

  const handleDeleteNote = async (jobId, index) => {
    dispatchNotes({ type: "DELETE_NOTE", jobId, index });
    if (APPS_SCRIPT_URL) {
      const job = INITIAL_DATA.find((d) => d.id === jobId);
      await apiPost({ action: "deleteNote", jobId, week: job ? job.week : selectedWeek, noteIndex: index });
    }
  };

  return h("div", { style: { maxWidth: "430px", margin: "0 auto", backgroundColor: "#F5F5F3", minHeight: "100vh", paddingBottom: "40px" } },
    // Header
    h("div", { style: { backgroundColor: "#FFFFFF", padding: "16px 20px", position: "sticky", top: 0, zIndex: 10, borderBottom: "1px solid #E5E5E5" } },
      // Status bar
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px", paddingTop: "4px" } },
        h("div", { style: { fontSize: "11px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em" } }, "Detailing Planner"),
        h("div", { style: { display: "flex", alignItems: "center", gap: "12px" } },
          h(SyncBadge, { connected: isConnected }),
          lastRefresh ? h("span", { style: { fontSize: "10px", color: "#CCC" } }, lastRefresh.toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" })) : null
        )
      ),
      // Week switcher
      h("div", { style: { display: "flex", gap: "6px", marginBottom: "20px" } },
        WEEKS.map((w) => h("button", { key: w.key, onClick: () => handleWeekChange(w.key), style: { flex: 1, padding: "12px 8px", borderRadius: "12px", border: "none", backgroundColor: selectedWeek === w.key ? "#000000" : "transparent", color: selectedWeek === w.key ? "#FFFFFF" : "#888888", cursor: "pointer", transition: "all 0.2s ease", textAlign: "center" } },
          h("div", { style: { fontSize: "16px", fontWeight: 800, letterSpacing: "-0.02em" } }, w.label),
          h("div", { style: { fontSize: "10px", fontWeight: 500, marginTop: "2px", opacity: 0.7 } }, w.dateRange)
        ))
      ),
      // Stats — hero numbers
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-end", paddingBottom: "4px" } },
        h("div", null,
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Auto\u2019s"),
          h("div", { style: { fontSize: "48px", fontWeight: 900, color: "#000000", letterSpacing: "-0.04em", lineHeight: 0.95 } }, totalAutos)
        ),
        h("div", { style: { textAlign: "center" } },
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Uren"),
          h("div", { style: { fontSize: "48px", fontWeight: 900, color: "#000000", letterSpacing: "-0.04em", lineHeight: 0.95 } }, totalUren > 0 ? totalUren : "\u2014")
        ),
        h("div", { style: { textAlign: "center" } },
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Dagen"),
          h("div", { style: { fontSize: "48px", fontWeight: 900, color: "#000000", letterSpacing: "-0.04em", lineHeight: 0.95 } }, groupedByDay.length)
        ),
        h("div", { style: { textAlign: "right" } },
          h("div", { style: { fontSize: "10px", fontWeight: 500, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "2px" } }, "Klaar"),
          h("div", { style: { fontSize: "48px", fontWeight: 900, color: "#000000", letterSpacing: "-0.04em", lineHeight: 0.95 } }, filtered.filter((j) => j.ready === "Ja").length)
        )
      )
    ),
    // Day sections
    h("div", { style: { padding: "24px 20px 0" } },
      groupedByDay.length === 0
        ? h("div", { style: { textAlign: "center", padding: "60px 20px", color: "#888" } },
            h("div", { style: { fontSize: "48px", fontWeight: 900, color: "#CCC", letterSpacing: "-0.04em", marginBottom: "8px" } }, "\u2014"),
            h("div", { style: { fontSize: "14px", fontWeight: 600 } }, "Geen opdrachten deze week")
          )
        : groupedByDay.map(([dag, { datum, jobs }]) => h(DaySection, { key: dag, dag, datum, jobs, notes, onAddNote: handleAddNote, onDeleteNote: handleDeleteNote, userName, onStatusChange: handleStatusChange, onUrenChange: handleUrenChange }))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
